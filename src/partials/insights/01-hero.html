<section class="insights-hero">
  <div class="insights-hero__bg" aria-hidden="true">
    <img src="/assets/images/insights-hero-bg.webp" width="1536" height="1024" alt="" loading="eager" fetchpriority="high" />
  </div>
  <div class="insights-hero__inner">
    <div class="insights-hero__rings" aria-hidden="true">
      <div class="insights-hero__ring" style="left:950px; top:-120px; width:500px; height:500px;"></div>
      <div class="insights-hero__ring" style="left:1200px; top:200px; width:300px; height:300px;"></div>
      <div class="insights-hero__ring" style="left:800px; top:360px; width:160px; height:160px;"></div>
    </div>

    <p class="insights-hero__eyebrow">INSIGHTS &amp; RESOURCES</p>
    <p class="insights-hero__watermark" aria-hidden="true">INS</p>

    <h1 class="insights-hero__title">
      <span class="insights-hero__title-line">Finance tips,</span>
      <span class="insights-hero__title-line text-outline">no fluff.</span>
    </h1>

    <p class="insights-hero__body">Practical finance and accounting insights for GCC business owners, founders, and finance leads.</p>

    <div class="insights-hero__newsletter">
      <p class="insights-hero__newsletter-title">Get insights in your inbox.</p>
      <p class="insights-hero__newsletter-subtitle">Monthly. No spam. Unsubscribe anytime.</p>
      <form class="insights-hero__form">
        <input class="insights-hero__input" type="email" placeholder="your@email.com" aria-label="Email address" />
        <button class="insights-hero__submit" type="submit">SUBSCRIBE &rarr;</button>
      </form>
    </div>
  </div>
</section>
