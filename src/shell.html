<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- Shared hollow-outline text effect, used by every "outline" heading
       span sitewide. See css/base.css .text-outline for the exact Figma
       spec this reproduces (Fill: none, Stroke: white, Position: Outside,
       Weight: 3) and why feMorphology dilate+subtract is the correct
       technique for it, not an approximation. radius="3" is Figma's
       literal stroke weight, used directly. Apply with `color: <solid>;
       filter: url(#text-outline-filter);` on real text — the filter turns
       a solid fill into a hollow ring outside the glyph, so the text
       stays real/selectable HTML rather than becoming an image. -->
  <filter id="text-outline-filter">
    <feMorphology in="SourceGraphic" operator="dilate" radius="3" result="dilated" />
    <feComposite in="dilated" in2="SourceGraphic" operator="out" />
  </filter>
</svg>

</body>
